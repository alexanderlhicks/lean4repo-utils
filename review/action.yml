name: AI Code Review Action
description: 'Performs an AI code review based on comments'
inputs:
  github_token:
    description: 'GitHub Token for API calls'
    required: true
  api_key:
    description: 'OpenRouter API key'
    required: true
  pr_number:
    description: 'The Pull Request number'
    required: true
  spec_refs:
    description: 'Comma-separated local paths (files or dirs) to specification / knowledge-base documents (PDF/md/txt/tex/lean) that should drive the formalization checklist and ground reviewers.'
    required: false
  additional_comments:
    description: 'Freeform focus instructions for the reviewers (e.g. everything after `/review` in a PR comment). URLs it mentions are fetched as external references, and existing repo-relative paths are loaded as spec/repo context, automatically.'
    required: false
  model:
    description: 'OpenRouter model slug for the deep agents (spec, per-file review, cross-file, dependent-impact). Defaults to the open-weight deepseek/deepseek-v4-pro; override with any slug. Must support tool-calling + structured output.'
    required: false
    default: 'deepseek/deepseek-v4-pro'
  lint:
    description: 'Whether to run the linter'
    required: false
    default: 'false'
  dependency_depth:
    description: 'Depth of transitive dependency traversal (1=direct only, 2=imports of imports)'
    required: false
    default: '2'
  dependent_impact_max:
    description: 'Max number of unchanged dependent files to review for breakage caused by the PR (second-order pass). 0 disables it.'
    required: false
    default: '10'
  escape_hatch_allowlist:
    description: 'Comma-separated escape hatches sanctioned for this repo (e.g. "opaque,axiom"). Still reported, but do not trigger the hard "Changes Requested" verdict when introduced.'
    required: false
    default: ''
  enable_web_search:
    description: 'Enable OpenRouter web-search grounding for agents (adds cost). "true" to enable.'
    required: false
    default: 'false'
  lean_tools:
    description: 'Give the reviewer and verifier agents Lean toolchain tools (lean_check / lean_print / lean_print_axioms / lean_typecheck via `lake env lean`) so they can check claims against the real compiler instead of guessing. "false" to disable.'
    required: false
    default: 'true'
  thinking_budget:
    description: 'Thinking token budget for deep-analysis agents (spec, per-file review, cross-file). Triage and synthesis use 1/5 of this.'
    required: false
    default: '10240'
  spec_model:
    description: 'Model override for the Specification Analyst agent. Falls back to model.'
    required: false
  triage_model:
    description: 'Model override for the Triage agent. Falls back to model.'
    required: false
  review_model:
    description: 'Model override for the per-file Code Reviewer agent. Falls back to model.'
    required: false
  cross_file_model:
    description: 'Model override for the Cross-File Analysis agent. Falls back to model.'
    required: false
  synthesis_model:
    description: 'Model override for the Synthesis agent. Falls back to model.'
    required: false
  verify_model:
    description: 'Model for the verification pass. Defaults to the open-weight z-ai/glm-5.2 — a DIFFERENT family from the default model, for an independent check (less self-agreement bias). Override with any slug; keep it a different family than model.'
    required: false
    default: 'z-ai/glm-5.2'
  verify_findings:
    description: 'Run the adversarial verification pass that filters likely-false-positive findings. "false" to disable.'
    required: false
    default: 'true'
outputs:
  review_text:
    description: "The generated review text"
    value: ${{ steps.run_review.outputs.review_text }}
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Lean and Build
      uses: leanprover/lean-action@v1.4.0
      with:
        build: true
        test: false
        lint: ${{ inputs.lint }}


    - name: Install dependencies
      run: uv sync --project "${{ github.action_path }}" --no-dev --frozen
      shell: bash

    - name: Discover Related Files
      id: discover_files
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        DEPENDENCY_DEPTH: ${{ inputs.dependency_depth }}
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/discover_files.py"


    - name: Extract Lean Toolchain Info
      id: lean_info
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        CHANGED_FILES: ${{ steps.discover_files.outputs.discovered_files }}
        SUMMARY_FILES: ${{ steps.discover_files.outputs.summary_files }}
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/lean_info_extractor.py"

    - name: Run AI Review Script
      shell: bash
      id: run_review
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        API_KEY: ${{ inputs.api_key }}
        MODEL: ${{ inputs.model }}
        PR_NUMBER: ${{ inputs.pr_number }}
        SPEC_REFS: ${{ inputs.spec_refs }}
        DISCOVERED_FILES: ${{ steps.discover_files.outputs.discovered_files }}
        SUMMARY_FILES: ${{ steps.discover_files.outputs.summary_files }}
        LAKE_GRAPH: ${{ steps.discover_files.outputs.lake_graph }}
        DEPENDENT_IMPACT_MAX: ${{ inputs.dependent_impact_max }}
        ESCAPE_HATCH_ALLOWLIST: ${{ inputs.escape_hatch_allowlist }}
        ENABLE_WEB_SEARCH: ${{ inputs.enable_web_search }}
        LEAN_TOOLS: ${{ inputs.lean_tools }}
        LEAN_INFO: ${{ steps.lean_info.outputs.lean_info_formatted }}
        ADDITIONAL_COMMENTS: ${{ inputs.additional_comments }}
        THINKING_BUDGET: ${{ inputs.thinking_budget }}
        SPEC_MODEL: ${{ inputs.spec_model }}
        TRIAGE_MODEL: ${{ inputs.triage_model }}
        REVIEW_MODEL: ${{ inputs.review_model }}
        CROSS_FILE_MODEL: ${{ inputs.cross_file_model }}
        SYNTHESIS_MODEL: ${{ inputs.synthesis_model }}
        VERIFY_MODEL: ${{ inputs.verify_model }}
        VERIFY_FINDINGS: ${{ inputs.verify_findings }}
      run: |
        # Repo context = files discovered from the dependency graph; paths
        # mentioned in additional_comments are merged in by review.py itself.
        REPO_CONTEXT_REFS="$DISCOVERED_FILES"

        # Run the script and capture its output to post as a comment later
        # We use a special "end of file" marker to handle multiline output
        EOF_MARKER=$(head /dev/urandom | tr -dc A-Za-z0-9 | head -c 16)
        echo "review_text<<$EOF_MARKER" >> $GITHUB_OUTPUT
        uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/review.py" \
          --pr-number "$PR_NUMBER" \
          --repo-context-refs "$REPO_CONTEXT_REFS" \
          --additional-comments "$ADDITIONAL_COMMENTS" \
          --model "$MODEL" \
          --thinking-budget "$THINKING_BUDGET" \
          ${SPEC_MODEL:+--spec-model "$SPEC_MODEL"} \
          ${TRIAGE_MODEL:+--triage-model "$TRIAGE_MODEL"} \
          ${REVIEW_MODEL:+--review-model "$REVIEW_MODEL"} \
          ${CROSS_FILE_MODEL:+--cross-file-model "$CROSS_FILE_MODEL"} \
          ${SYNTHESIS_MODEL:+--synthesis-model "$SYNTHESIS_MODEL"} >> $GITHUB_OUTPUT
        echo "$EOF_MARKER" >> $GITHUB_OUTPUT

    - name: Post Review
      uses: actions/github-script@v8
      env:
        REVIEW_TEXT: ${{ steps.run_review.outputs.review_text }}
        ADDITIONAL_COMMENTS: ${{ inputs.additional_comments }}
        PR_NUMBER: ${{ inputs.pr_number }}
      with:
        retries: 3
        script: |
          const fs = require('fs');
          let headerText = '### 🤖 Initial AI review';
          if (process.env.ADDITIONAL_COMMENTS) {
            headerText = '### 🤖 AI Review (with review instructions)';
          }
          const header = headerText + '\n\n';
          const reviewText = process.env.REVIEW_TEXT || '';
          const body = reviewText.startsWith('### 🤖 ') ? reviewText : header + reviewText;
          const { owner, repo } = context.repo;
          const pr_number = parseInt(process.env.PR_NUMBER);

          // Post any overflow parts (a large review split across the comment
          // size limit) as follow-up comments, so nothing is lost to truncation.
          // Overflow parts carry the "AI review continued (part" marker; stale
          // ones from previous runs are pruned first so they don't accumulate.
          const OVERFLOW_MARKER = 'AI review continued (part';
          async function postOverflow() {
            let extra = [];
            try {
              if (fs.existsSync('review_comments.json')) {
                extra = JSON.parse(fs.readFileSync('review_comments.json', 'utf8'));
              }
            } catch (e) {
              console.log('No overflow comments file.');
            }
            if (!extra.length) return;
            try {
              const existing = await github.rest.issues.listComments({
                owner, repo, issue_number: pr_number, per_page: 100,
              });
              for (const c of existing.data) {
                if (c.user.type === 'Bot' && c.body && c.body.includes(OVERFLOW_MARKER)) {
                  await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
                }
              }
            } catch (e) {
              console.log(`Could not prune old overflow comments: ${e.message}`);
            }
            for (const part of extra) {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr_number, body: part });
            }
            console.log(`Posted ${extra.length} overflow comment(s).`);
          }

          // Try to post a proper GitHub Review with line annotations
          let annotations = [];
          try {
            if (fs.existsSync('review_annotations.json')) {
              annotations = JSON.parse(fs.readFileSync('review_annotations.json', 'utf8'));
            }
          } catch (e) {
            console.log('No annotations file found, posting as comment only.');
          }

          if (annotations.length > 0) {
            try {
              // Get the PR's head SHA for the review
              const pr = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
              const commit_id = pr.data.head.sha;

              // GitHub limits to 50 comments per review
              const comments = annotations.slice(0, 50).map(a => ({
                path: a.path,
                line: a.line,
                side: a.side,
                body: a.body
              }));

              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr_number,
                commit_id,
                body: body,
                event: 'COMMENT',
                comments
              });
              console.log(`Posted review with ${comments.length} line annotations.`);
              await postOverflow();
              return;
            } catch (e) {
              console.log(`Failed to post review with annotations: ${e.message}. Falling back to comment.`);
            }
          }

          // Fallback: post/update a regular PR comment
          const issue_number = pr_number;
          const existingComments = await github.rest.issues.listComments({
            owner, repo, issue_number,
          });

          const botComment = existingComments.data.find(comment =>
            comment.user.type === 'Bot' && (comment.body.includes('### 🤖 AI Review') || comment.body.includes('### 🤖 Initial AI review'))
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner, repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body
            });
          }
          await postOverflow();

    - name: Clean up artifacts
      if: always()
      shell: bash
      run: |
        rm -f ./review_annotations.json ./review_comments.json
