name: AI Code Review Action
description: 'Performs an AI code review based on comments'
inputs:
  github_token:
    description: 'GitHub Token for API calls'
    required: true
  api_key:
    description: 'OpenRouter API key'
    required: true
  pr_number:
    description: 'The Pull Request number'
    required: true
  spec_refs:
    description: 'Comma-separated local paths (files or dirs) to specification / knowledge-base documents (PDF/md/txt/tex/lean) that should drive the formalization checklist and ground reviewers.'
    required: false
  additional_comments:
    description: 'Freeform focus instructions for the reviewers (e.g. everything after `/review` in a PR comment). URLs it mentions are fetched as external references, and existing repo-relative paths are loaded as spec/repo context, automatically.'
    required: false
  model:
    description: 'OpenRouter model slug for the deep agents (spec, per-file review, cross-file, dependent-impact). Defaults to the open-weight z-ai/glm-5.2; override with any slug. Must support tool-calling + structured output.'
    required: false
    default: 'z-ai/glm-5.2'
  lint:
    description: 'Whether to run the linter'
    required: false
    default: 'false'
  dependency_depth:
    description: 'Depth of transitive dependency traversal (1=direct only, 2=imports of imports)'
    required: false
    default: '2'
  dependent_impact_max:
    description: 'Max number of unchanged dependent files to review for breakage caused by the PR (second-order pass). 0 disables it.'
    required: false
    default: '10'
  escape_hatch_allowlist:
    description: 'Comma-separated escape hatches sanctioned for this repo (e.g. "opaque,axiom"). Still reported, but do not trigger the hard "Changes Requested" verdict when introduced.'
    required: false
    default: ''
  enable_web_search:
    description: 'Enable OpenRouter web-search grounding for agents (adds cost). "true" to enable.'
    required: false
    default: 'false'
  lean_tools:
    description: 'Give the reviewer and verifier agents Lean toolchain tools (lean_check / lean_print / lean_print_axioms / lean_typecheck via `lake env lean`) so they can check claims against the real compiler instead of guessing. "false" to disable.'
    required: false
    default: 'true'
  thinking_budget:
    description: 'Thinking token budget for deep-analysis agents (spec, per-file review, cross-file). Triage and synthesis use 1/5 of this.'
    required: false
    default: '10240'
  spec_model:
    description: 'Model override for the Specification Analyst agent. Falls back to model.'
    required: false
  triage_model:
    description: 'Model override for the Triage agent. Falls back to model.'
    required: false
  review_model:
    description: 'Model override for the per-file Code Reviewer agent. Falls back to model.'
    required: false
  cross_file_model:
    description: 'Model override for the Cross-File Analysis agent. Falls back to model.'
    required: false
  synthesis_model:
    description: 'Model override for the Synthesis agent. Falls back to model.'
    required: false
  verify_model:
    description: 'Model for the verification pass. Defaults to the open-weight deepseek/deepseek-v4-pro — a DIFFERENT family from the default model, for an independent check (less self-agreement bias). Override with any slug; keep it a different family than model.'
    required: false
    default: 'deepseek/deepseek-v4-pro'
  verify_findings:
    description: 'Run the adversarial verification pass that filters likely-false-positive findings. "false" to disable.'
    required: false
    default: 'true'
  llm_max_run_tokens:
    description: 'Per-run token ceiling (C3). Once exceeded, no further LLM calls are made and the run degrades gracefully (partial results + a loud banner) instead of consuming unbounded spend on a shared key. Empty = disabled. The token ceiling is authoritative; source from workflow/secrets config, NEVER from PR content.'
    required: false
    default: ''
  llm_max_run_cost:
    description: 'Per-run cost ceiling in OpenRouter credits (C3). Requires llm_max_run_tokens (a cost-only budget is rejected — cost can be BYOK-fee-only or absent). Empty = disabled.'
    required: false
    default: ''
  llm_budget_mode:
    description: 'How to use llm_max_run_tokens / llm_max_run_cost. "advisory" (default) uses the budget to size prompts but keeps reviewing even after it is crossed. "hard" stops further LLM calls once crossed and posts an incomplete/degraded review.'
    required: false
    default: 'advisory'
  llm_loud_exit:
    description: 'When "true", the action exits non-zero if the run degraded (spend/quota/auth failure, or budget exhaustion in hard mode), AFTER posting the comment. Default "false" keeps the job green with a banner + error annotation. Do NOT mark this action as a required check with loud-exit enabled — a provider outage would then block all merges.'
    required: false
    default: 'false'
outputs:
  review_text:
    description: "The generated review text"
    value: ${{ steps.run_review.outputs.review_text }}
runs:
  using: "composite"
  steps:
    # S1: resolve the PR HEAD (and BASE) SHA from pr_number BEFORE checkout. On the
    # issue_comment /review path there is no github.event.pull_request, so without this
    # the checkout below lands on the base branch and the whole review reads the wrong
    # code. Fail-closed (never a base fallback). NOTE: this pins HEAD for EVERY trigger —
    # a future auto (pull_request) trigger will review HEAD, not the refs/pull/N/merge
    # commit that the default checkout would use. That is a deliberate semantic choice
    # (the action only sees pr_number); the auto-trigger fast-follow must expect HEAD.
    - name: Resolve PR head SHA
      id: resolve_head
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        # Route pr_number through env and reference it as a shell variable — never
        # interpolate ${{ inputs.pr_number }} into the run: body (that is a GHA
        # expression-injection sink, per the standard used everywhere else in this file).
        # $GITHUB_REPOSITORY is a built-in, trusted default env var.
        PR_NUMBER: ${{ inputs.pr_number }}
      run: bash "${{ github.action_path }}/resolve_pr_head.sh" "$GITHUB_REPOSITORY" "$PR_NUMBER"

    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        # Immutable HEAD sha (not refs/pull/N/head or a branch), so the worktree, the
        # diff, discovery, and the review annotations all anchor to ONE commit. For a
        # fork PR the SHA is fetchable via the base repo's PR refs; if a future runner
        # cannot fetch a raw SHA, the fallback is to fetch refs/pull/<n>/head and hard-
        # reset to head_sha (fail closed on mismatch) — see the dogfood notes.
        ref: ${{ steps.resolve_head.outputs.head_sha }}
        fetch-depth: 0
        # Do not leave the GITHUB_TOKEN in .git/config: the Lean build step below runs
        # PR-branch lakefile code in this same workspace, and the reviewer's lean_tools
        # execute model-directed Lean IO. Nothing here pushes, so drop the credential.
        # (Full lean_tools sandboxing is tracked as a separate roadmap item; until it
        # lands, do not wire this action under pull_request_target with a privileged
        # token — the HEAD checkout means untrusted PR code now builds/elaborates here.)
        persist-credentials: false

    - name: Mask secrets
      shell: bash
      env:
        API_KEY: ${{ inputs.api_key }}
        GH_TOKEN_TO_MASK: ${{ inputs.github_token }}
      run: |
        echo "::add-mask::$API_KEY"
        echo "::add-mask::$GH_TOKEN_TO_MASK"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Set up Lean and Build
      uses: leanprover/lean-action@v1.5.0
      with:
        # Toolchain/cache setup happens here; the explicit build below captures
        # diagnostics for the review instead of leaving the output inside this
        # action's log stream only.
        build: false
        test: false
        lint: ${{ inputs.lint }}

    - name: Build Lean project with captured diagnostics
      id: lean_build
      shell: bash
      continue-on-error: true
      run: |
        set +e
        build_log="$RUNNER_TEMP/lean-build.log"
        lake build 2>&1 | tee "$build_log"
        build_rc=${PIPESTATUS[0]}

        # Keep the model-facing output bounded while retaining the complete log
        # in the Actions log for debugging. A random delimiter avoids collisions
        # with compiler output.
        output_marker="EOF_LEAN_BUILD_$(openssl rand -hex 16)"
        echo "build_output<<$output_marker" >> "$GITHUB_OUTPUT"
        if [ -s "$build_log" ]; then
          build_bytes=$(wc -c < "$build_log")
          if [ "$build_bytes" -le 120000 ]; then
            cat "$build_log" >> "$GITHUB_OUTPUT"
          else
            head -c 60000 "$build_log" >> "$GITHUB_OUTPUT"
            printf '\n... [middle of compiler log omitted] ...\n' >> "$GITHUB_OUTPUT"
            tail -c 60000 "$build_log" >> "$GITHUB_OUTPUT"
          fi
        fi
        printf '\n%s\n' "$output_marker" >> "$GITHUB_OUTPUT"

        if [ "$build_rc" -eq 0 ]; then
          echo "BUILD_SUCCEEDED=true" >> "$GITHUB_ENV"
          echo "BUILD_STATUS=success" >> "$GITHUB_ENV"
          echo "build_succeeded=true" >> "$GITHUB_OUTPUT"
          echo "build_status=success" >> "$GITHUB_OUTPUT"
        else
          echo "BUILD_SUCCEEDED=false" >> "$GITHUB_ENV"
          echo "BUILD_STATUS=failure" >> "$GITHUB_ENV"
          echo "build_succeeded=false" >> "$GITHUB_OUTPUT"
          echo "build_status=failure" >> "$GITHUB_OUTPUT"
        fi
        exit "$build_rc"


    - name: Install dependencies
      run: uv sync --project "${{ github.action_path }}" --no-dev --frozen
      shell: bash

    - name: Discover Related Files
      id: discover_files
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        DEPENDENCY_DEPTH: ${{ inputs.dependency_depth }}
        # Pin discovery to the SAME base...head SHAs the worktree was checked out at
        # (S1), so a mid-run force-push can't skew changed-files vs. the reviewed tree.
        PR_HEAD_SHA: ${{ steps.resolve_head.outputs.head_sha }}
        PR_BASE_SHA: ${{ steps.resolve_head.outputs.base_sha }}
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/discover_files.py"


    - name: Extract Lean Toolchain Info
      id: lean_info
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        CHANGED_FILES: ${{ steps.discover_files.outputs.changed_files }}
        SUMMARY_FILES: ${{ steps.discover_files.outputs.summary_files }}
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/lean_info_extractor.py"

    - name: Build paper/Lean source index
      id: paper_lean_evidence
      shell: bash
      continue-on-error: true
      env:
        CHANGED_FILES: ${{ steps.discover_files.outputs.changed_files }}
        SPEC_REFS: ${{ inputs.spec_refs }}
        ADDITIONAL_COMMENTS: ${{ inputs.additional_comments }}
        PAPER_LEAN_EVIDENCE_OUT: ${{ runner.temp }}/paper-lean-evidence.json
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/paper_lean_evidence.py"

    - name: Run AI Review Script
      shell: bash
      id: run_review
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        API_KEY: ${{ inputs.api_key }}
        MODEL: ${{ inputs.model }}
        PR_NUMBER: ${{ inputs.pr_number }}
        # Pin the diff + the reviewed-at stamp to the checked-out SHAs (S1).
        PR_HEAD_SHA: ${{ steps.resolve_head.outputs.head_sha }}
        PR_BASE_SHA: ${{ steps.resolve_head.outputs.base_sha }}
        SPEC_REFS: ${{ inputs.spec_refs }}
        DISCOVERED_FILES: ${{ steps.discover_files.outputs.discovered_files }}
        SUMMARY_FILES: ${{ steps.discover_files.outputs.summary_files }}
        LAKE_GRAPH_PATH: ${{ steps.discover_files.outputs.lake_graph_path }}
        DEPENDENT_IMPACT_MAX: ${{ inputs.dependent_impact_max }}
        ESCAPE_HATCH_ALLOWLIST: ${{ inputs.escape_hatch_allowlist }}
        ENABLE_WEB_SEARCH: ${{ inputs.enable_web_search }}
        LEAN_TOOLS: ${{ inputs.lean_tools }}
        LEAN_INFO: ${{ steps.lean_info.outputs.lean_info_formatted }}
        BUILD_SUCCEEDED: ${{ steps.lean_build.outputs.build_succeeded }}
        BUILD_STATUS: ${{ steps.lean_build.outputs.build_status }}
        BUILD_OUTPUT: ${{ steps.lean_build.outputs.build_output }}
        PAPER_LEAN_EVIDENCE: ${{ steps.paper_lean_evidence.outputs.paper_lean_evidence_formatted }}
        ADDITIONAL_COMMENTS: ${{ inputs.additional_comments }}
        THINKING_BUDGET: ${{ inputs.thinking_budget }}
        SPEC_MODEL: ${{ inputs.spec_model }}
        TRIAGE_MODEL: ${{ inputs.triage_model }}
        REVIEW_MODEL: ${{ inputs.review_model }}
        CROSS_FILE_MODEL: ${{ inputs.cross_file_model }}
        SYNTHESIS_MODEL: ${{ inputs.synthesis_model }}
        VERIFY_MODEL: ${{ inputs.verify_model }}
        VERIFY_FINDINGS: ${{ inputs.verify_findings }}
        # Per-run spend control (C3). Threaded ONLY through env (never interpolated into
        # the run: body — that would be a GHA expression-injection sink). Empty == unset
        # == disabled. Names must match review.py's ENV_MAX_RUN_* constants exactly.
        LLM_MAX_RUN_TOKENS: ${{ inputs.llm_max_run_tokens }}
        LLM_MAX_RUN_COST: ${{ inputs.llm_max_run_cost }}
        LLM_BUDGET_MODE: ${{ inputs.llm_budget_mode }}
        LLM_LOUD_EXIT: ${{ inputs.llm_loud_exit }}
      run: |
        # Repo context = files discovered from the dependency graph; paths
        # mentioned in additional_comments are merged in by review.py itself.
        REPO_CONTEXT_REFS="$DISCOVERED_FILES"

        # Run the script and capture its output to post as a comment later
        # We use a special "end of file" marker to handle multiline output
        EOF_MARKER=$(openssl rand -hex 16)
        echo "review_text<<$EOF_MARKER" >> $GITHUB_OUTPUT
        # Capture review.py's exit code WITHOUT letting `set -e -o pipefail` abort the
        # step before the heredoc terminator is written: a non-zero exit (loud-exit)
        # would otherwise leave review_text unterminated/empty and Post Review would
        # post nothing even with if: !cancelled().
        rc=0
        uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/review.py" \
          --pr-number "$PR_NUMBER" \
          --repo-context-refs "$REPO_CONTEXT_REFS" \
          --additional-comments "$ADDITIONAL_COMMENTS" \
          --model "$MODEL" \
          --thinking-budget "$THINKING_BUDGET" \
          ${SPEC_MODEL:+--spec-model "$SPEC_MODEL"} \
          ${TRIAGE_MODEL:+--triage-model "$TRIAGE_MODEL"} \
          ${REVIEW_MODEL:+--review-model "$REVIEW_MODEL"} \
          ${CROSS_FILE_MODEL:+--cross-file-model "$CROSS_FILE_MODEL"} \
          ${SYNTHESIS_MODEL:+--synthesis-model "$SYNTHESIS_MODEL"} >> $GITHUB_OUTPUT || rc=$?
        echo "$EOF_MARKER" >> $GITHUB_OUTPUT
        # review.py's stdout is the PR-comment channel, so it cannot print workflow
        # commands itself — it writes review_health.json and we emit the annotation here.
        if [ -f review_health.json ] && grep -qE '"degraded": *true' review_health.json; then
          echo "::error::AI review degraded: an LLM spend/quota/auth failure or per-run budget exhaustion left the review incomplete — results are partial (see the run log)."
        fi
        exit $rc

    - name: Post Review
      # Post even on a non-green run (loud-exit) so the banner/partial results are still
      # delivered — but NOT when the run was cancelled or the review step never ran.
      if: ${{ !cancelled() && steps.run_review.outcome != 'skipped' }}
      uses: actions/github-script@v9
      env:
        REVIEW_TEXT: ${{ steps.run_review.outputs.review_text }}
        ADDITIONAL_COMMENTS: ${{ inputs.additional_comments }}
        PR_NUMBER: ${{ inputs.pr_number }}
        # Anchor the review's line annotations to the EXACT commit that was reviewed
        # (S1), not a fresh re-resolve that a mid-run force-push could have moved.
        REVIEW_HEAD_SHA: ${{ steps.resolve_head.outputs.head_sha }}
      with:
        retries: 3
        script: |
          const fs = require('fs');
          const reviewText = process.env.REVIEW_TEXT || '';
          // Guard: a pre-provider crash (e.g. missing pr.diff) can leave review_text
          // empty. Do not post an empty/header-only comment — bail out quietly.
          if (!reviewText.trim()) {
            console.log('review_text is empty — skipping comment post.');
            return;
          }
          // Fallback header only (review.py's output already starts with '### 🤖 ',
          // so this branch is rarely taken). Mirror review.py's two states — guided vs
          // unguided — with no "Initial/subsequent" distinction (that is R2's concern).
          const headerText = process.env.ADDITIONAL_COMMENTS
            ? '### 🤖 AI Review (with additional instructions)'
            : '### 🤖 AI Review';
          const header = headerText + '\n\n';
          const body = reviewText.startsWith('### 🤖 ') ? reviewText : header + reviewText;
          const { owner, repo } = context.repo;
          const pr_number = parseInt(process.env.PR_NUMBER);
          let commit_id = process.env.REVIEW_HEAD_SHA;
          if (!commit_id) {
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
            commit_id = pr.data.head.sha;
          }
          const reviewMarker = '<!-- lean-ai-review:' + commit_id + ' -->';
          const markedBody = reviewMarker + '\n' + body;

          // Post any overflow parts (a large review split across the comment
          // size limit) as follow-up comments, so nothing is lost to truncation.
          // Overflow parts carry the "AI review continued (part" marker; stale
          // ones from previous runs are pruned first so they don't accumulate.
          const OVERFLOW_MARKER = 'AI review continued (part';
          async function postOverflow() {
            let extra = [];
            try {
              if (fs.existsSync('review_comments.json')) {
                extra = JSON.parse(fs.readFileSync('review_comments.json', 'utf8'));
              }
            } catch (e) {
              console.log('No overflow comments file.');
            }
            try {
              const existing = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: pr_number, per_page: 100,
              });
              for (const c of existing) {
                if (c.user.type === 'Bot' && c.body &&
                    c.body.includes(reviewMarker) && c.body.includes(OVERFLOW_MARKER)) {
                  await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
                }
              }
            } catch (e) {
              console.log(`Could not prune old overflow comments: ${e.message}`);
            }
            if (!extra.length) return;
            for (const part of extra) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr_number,
                body: reviewMarker + '\n' + part,
              });
            }
            console.log(`Posted ${extra.length} overflow comment(s).`);
          }

          // Try to post a proper GitHub Review with line annotations
          let annotations = [];
          try {
            if (fs.existsSync('review_annotations.json')) {
              annotations = JSON.parse(fs.readFileSync('review_annotations.json', 'utf8'));
            }
          } catch (e) {
            console.log('No annotations file found, posting as comment only.');
          }

          // A GitHub Review cannot be updated in place. Before creating a new
          // annotated review, dismiss an earlier bot review for this same head
          // that carries our marker. This keeps reruns on one commit idempotent
          // while leaving reviews for other commits in the PR history intact.
          async function supersedeSameHeadReview() {
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: pr_number, per_page: 100,
            });
            for (const review of reviews) {
              const isBot = review.user && review.user.type === 'Bot';
              // Only dismiss reviews emitted by this workflow. The generic AI
              // header is intentionally not enough: another bot may use it.
              const isOurReview = review.body && review.body.includes(reviewMarker);
              if (isBot && isOurReview && review.commit_id === commit_id &&
                  review.state !== 'DISMISSED' && review.id) {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number: pr_number, review_id: review.id,
                  message: 'Superseded by a rerun for the same reviewed commit.',
                });
              }
            }
          }

          async function removeSameHeadRegularComments() {
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            for (const c of existing) {
              if (c.user.type === 'Bot' && c.body && c.body.includes(reviewMarker) &&
                  !c.body.includes(OVERFLOW_MARKER)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
          }

          // A rerun can switch between the annotated-review and regular-comment
          // paths (for example, when findings cross the inline-comment limit).
          // Supersede same-head review objects before either path so both modes
          // remain idempotent for the reviewed commit.
          try {
            await supersedeSameHeadReview();
          } catch (e) {
            console.log(`Could not supersede an earlier review: ${e.message}`);
          }

          if (annotations.length > 0) {
            try {
              // GitHub limits to 50 comments per review
              const comments = annotations.slice(0, 50).map(a => ({
                path: a.path,
                line: a.line,
                side: a.side,
                body: a.body
              }));

              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr_number,
                commit_id,
                body: markedBody,
                event: 'COMMENT',
                comments
              });
              console.log(`Posted review with ${comments.length} line annotations.`);
              try {
                await removeSameHeadRegularComments();
              } catch (e) {
                console.log(`Annotated review posted, but old regular comment cleanup failed: ${e.message}`);
              }
              try {
                await postOverflow();
              } catch (e) {
                console.log(`Annotated review posted, but overflow comments failed: ${e.message}`);
              }
              return;
            } catch (e) {
              console.log(`Failed to post review with annotations: ${e.message}. Falling back to comment.`);
            }
          }

          // Fallback: post/update a regular PR comment
          const issue_number = pr_number;
          const existingComments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });

          const botComment = existingComments.find(comment =>
            comment.user.type === 'Bot' && comment.body && comment.body.includes(reviewMarker)
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner, repo,
              comment_id: botComment.id,
              body: markedBody
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body: markedBody
            });
          }
          try {
            await postOverflow();
          } catch (e) {
            console.log(`Review comment posted, but overflow comments failed: ${e.message}`);
          }

    - name: Clean up artifacts
      if: always()
      shell: bash
      run: |
        rm -f ./review_annotations.json ./review_comments.json ./review_health.json
