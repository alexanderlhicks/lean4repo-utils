name: PR Summary Action
description: 'Generates a summary for a Pull Request'
inputs:
  github_token:
    description: 'GitHub Token for API calls'
    required: true
  api_key:
    description: 'OpenRouter API key'
    required: true
  github_repository:
    description: 'The GitHub repository (e.g., owner/repo)'
    required: true
  pr_number:
    description: 'The Pull Request number'
    required: true
  model:
    description: 'OpenRouter model slug (e.g., anthropic/claude-opus-4.8, google/gemini-3-pro-preview, openai/gpt-5). Defaults to the open-weight deepseek/deepseek-v4-flash (1M context, flash-tier pricing).'
    required: false
    default: 'deepseek/deepseek-v4-flash'
  lean_keywords:
    description: 'Comma-separated list of Lean keywords (e.g., theorem, def) to track for declaration changes and sorries'
    required: false
    default: 'def,abbrev,example,theorem,opaque,lemma,instance,constant,axiom'
  additional_instructions_path:
    description: 'Optional: Path to a file with deployment-supplied instructions for the analysis agent. Use it for style guides, progress trackers, framework cross-checks, doc/wiki references, or any project-specific guidance the LLM should apply to the PR diff.'
    required: false
    default: 'CONTRIBUTING.md'
  reasoning_effort:
    description: 'Optional reasoning/thinking effort applied to every model call: low, medium, or high. Empty (default) uses the model default. Ignored by models that do not support reasoning.'
    required: false
    default: ''
  validate_title:
    description: 'Validate PR title against conventional commit format: type[(scope)]: subject (scope is optional)'
    required: false
    default: 'false'
  apply_labels:
    description: >-
      When "true", reconcile deterministic PR labels from the diff signals:
      `sorry-added`, `native_decide`, `axiom-added`. The action manages ONLY
      these labels (adding those that apply, removing the rest) and never
      touches others; missing labels are created. Requires the token to have
      `pull-requests: write` (or `issues: write`). Default "false".
    required: false
    default: 'false'
  upstream_path:
    description: 'Path prefix for upstream-bound files (e.g., ToMathlib/). If changed files match, a reminder is shown.'
    required: false
    default: ''
  max_file_diff_chars:
    description: >-
      Max characters of a single file's diff sent to the summarizer before it
      is truncated at a hunk boundary (with a coverage note). Rough guide: Lean
      averages ~50 chars/line and ~4 chars/token, so the 60000 default ≈ ~1200
      lines ≈ ~15k tokens. Raise to truncate large files less (higher token
      cost); lower for a smaller-context model.
    required: false
    default: '60000'
  max_instructions_diff_chars:
    description: >-
      Max characters of the whole-PR diff sent to the additional-instructions
      agent in one call; above this the analysis is skipped (a partial result
      would mislead). Must fit the model's context alongside the instructions
      file and the response. Rough guide: ~50 chars/line, so the 400000 default
      ≈ ~8000 changed lines ≈ ~100k tokens (fits a ~128k-token model). Lower for
      a smaller-context model.
    required: false
    default: '400000'
  max_summary_files:
    description: >-
      Hard ceiling on the number of files individually summarized by the LLM in
      one run (U4). 0 (default) = unlimited (quality>cost). When set, proof-signal
      files (sorry/admit/native_decide) are summarized first, then other
      high-priority files up to this count; the rest are listed as "not
      individually summarized" (still fully covered by deterministic
      sorry/declaration/label tracking). Bounds worst-case LLM calls on a very
      large PR.
    required: false
    default: '0'
  llm_max_run_tokens:
    description: 'Per-run token ceiling (C3). Once exceeded, no further LLM calls are made and the summary degrades gracefully (partial results + a loud banner) instead of consuming unbounded spend on a shared key. Empty = disabled. The token ceiling is authoritative; source from workflow/secrets config, NEVER from PR content.'
    required: false
    default: ''
  llm_max_run_cost:
    description: 'Per-run cost ceiling in OpenRouter credits (C3). Requires llm_max_run_tokens (a cost-only budget is rejected — cost can be BYOK-fee-only or absent). Empty = disabled.'
    required: false
    default: ''
  llm_loud_exit:
    description: 'When "true", the action exits non-zero if the run degraded (spend/quota/auth failure or budget exhausted), AFTER posting the comment. Default "false" keeps the job green with a banner + error annotation. Do NOT mark this action as a required check with loud-exit enabled.'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Checkout PR Code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0 # Fetch all history to enable diffing against base
        # This action is typically run under pull_request_target so it also sees
        # fork PRs. checkout v7 blocks fork-PR checkout in that context by
        # default; opt in because the action only reads the diff and posts a
        # comment — it never executes the checked-out PR code (deps and scripts
        # come from the action's own pinned source), so the fork content is data.
        allow-unsafe-pr-checkout: true

    - name: Mask secrets
      env:
        API_KEY: ${{ inputs.api_key }}
        GH_TOKEN_TO_MASK: ${{ inputs.github_token }}
      run: |
        echo "::add-mask::$API_KEY"
        echo "::add-mask::$GH_TOKEN_TO_MASK"
      shell: bash

    - name: Install uv
      uses: astral-sh/setup-uv@v9.0.0
      with:
        enable-cache: true
        # This is a uv workspace: the sole lockfile is one directory above this
        # subdirectory action. setup-uv resolves dependency globs relative to
        # working-directory, so hash the action repository's real lock—not a
        # nonexistent summary/uv.lock or the caller repository's dependencies.
        working-directory: "${{ github.action_path }}/.."
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: uv sync --project "${{ github.action_path }}" --no-dev --frozen
      shell: bash

    - name: Generate diff
      env:
        # Keep event metadata out of the shell source. The values are still
        # passed to git as quoted arguments, but branch/sha names must never be
        # interpolated directly into a `run:` script.
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        PR_DIFF_PATH: ${{ runner.temp }}/lean-summary-${{ github.run_id }}-${{ github.run_attempt }}.diff
      run: |
        # Under pull_request_target the checkout is the PR (possibly fork) head;
        # the base commit is often not in the local object graph, which makes
        # `git merge-base` fail. Fetch it from origin (the base repo) first,
        # falling back to the base branch ref.
        merge_base_ref="$BASE_SHA"
        if ! git fetch --no-tags origin "$BASE_SHA"; then
          # A runner may be unable to fetch the event SHA directly. Fetch the
          # base branch through an explicit refs/ path (so a branch name cannot
          # become a git option) and use FETCH_HEAD as the documented fallback.
          git fetch --no-tags origin "refs/heads/$BASE_REF"
          merge_base_ref=FETCH_HEAD
          echo "::warning::Base SHA was unavailable; diffing against the fetched base branch tip."
        fi
        MERGE_BASE=$(git merge-base "$merge_base_ref" HEAD)
        echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
        git diff "$MERGE_BASE" HEAD > "$PR_DIFF_PATH"
      shell: bash

    - name: Generate summary
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        API_KEY: ${{ inputs.api_key }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
        PR_NUMBER: ${{ inputs.pr_number }}
        PR_DIFF_PATH: ${{ runner.temp }}/lean-summary-${{ github.run_id }}-${{ github.run_attempt }}.diff
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_LEAN_KEYWORDS: ${{ inputs.lean_keywords }}
        INPUT_REASONING_EFFORT: ${{ inputs.reasoning_effort }}
        INPUT_ADDITIONAL_INSTRUCTIONS_PATH: ${{ inputs.additional_instructions_path }}
        # Trusted ref for the additional-instructions file (S4). base.sha is the
        # base-branch head at event time — writable only by maintainers, unlike
        # the checked-out PR head. Its objects are fetched by the "Generate
        # diff" step above; summary.py fails CLOSED (skips instructions, warns)
        # if the ref is empty or unresolvable, and never reads the instructions
        # file from the PR checkout in PR context.
        INSTRUCTIONS_BASE_REF: ${{ github.event.pull_request.base.sha }}
        INPUT_VALIDATE_TITLE: ${{ inputs.validate_title }}
        INPUT_APPLY_LABELS: ${{ inputs.apply_labels }}
        INPUT_UPSTREAM_PATH: ${{ inputs.upstream_path }}
        INPUT_MAX_FILE_DIFF_CHARS: ${{ inputs.max_file_diff_chars }}
        INPUT_MAX_INSTRUCTIONS_DIFF_CHARS: ${{ inputs.max_instructions_diff_chars }}
        INPUT_MAX_SUMMARY_FILES: ${{ inputs.max_summary_files }}
        # MERGE_BASE is set in the preceding "Generate diff" step via
        # `echo "MERGE_BASE=..." >> "$GITHUB_ENV"`. Re-declaring it here
        # makes the dependency explicit (the CI env-var consistency check
        # only inspects this env block) and is a runtime no-op.
        MERGE_BASE: ${{ env.MERGE_BASE }}
        # Per-run spend control (C3). Env-only (never interpolated into a run: body).
        # Empty == unset == disabled. summary.py handles loud-exit itself (it posts the
        # comment inline before returning a non-zero code), and prints its own ::error::
        # to stdout. Names must match summary.py's ENV_MAX_RUN_* constants exactly.
        LLM_MAX_RUN_TOKENS: ${{ inputs.llm_max_run_tokens }}
        LLM_MAX_RUN_COST: ${{ inputs.llm_max_run_cost }}
        LLM_LOUD_EXIT: ${{ inputs.llm_loud_exit }}
      run: uv run --project "${{ github.action_path }}" --no-dev --frozen python "${{ github.action_path }}/summary.py"
      shell: bash

    - name: Clean up artifacts
      if: always()
      env:
        PR_DIFF_PATH: ${{ runner.temp }}/lean-summary-${{ github.run_id }}-${{ github.run_attempt }}.diff
      run: rm -f "$PR_DIFF_PATH"
      shell: bash
